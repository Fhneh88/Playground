services:
  api:
    build: .
    ports:
      - "5201:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Data Source=/data/catalog.db"
      Redis__ConnectionString: "redis:6379"
      Redis__InstanceName: "weathercatalog:"
    volumes:
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqlite_data:
  redis_data:
