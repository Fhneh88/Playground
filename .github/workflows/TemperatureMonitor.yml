name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write        # dorny/test-reporter: создание check runs
      pull-requests: write # dorny/test-reporter: аннотации в PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore TemperatureMonitor/TemperatureMonitor.slnx

      - name: Build
        run: dotnet build TemperatureMonitor/TemperatureMonitor.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test TemperatureMonitor/TemperatureMonitor.Tests/TemperatureMonitor.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Results
          path: test-results/test-results.trx
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: test-results/**/coverage.cobertura.xml
          retention-days: 7
